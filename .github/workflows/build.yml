name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-hidapi

      - name: Build
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Create portable package
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/src/cli/wraith_cli.exe dist/wraith.exe
          cp build/src/core/libwraith.dll dist/
          cp /ucrt64/bin/libgcc_s_seh-1.dll dist/
          cp /ucrt64/bin/libstdc++-6.dll dist/
          cp /ucrt64/bin/libhidapi-0.dll dist/
          cp /ucrt64/bin/libwinpthread-1.dll dist/
          cp signalrgb/WraithW60.js dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wraith-w60-windows-x64
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config libudev-dev \
            autoconf automake libtool

      - name: Install hidapi from source
        run: |
          cd /tmp
          git clone https://github.com/libusb/hidapi.git
          cd hidapi
          ls -la
          ./autogen.sh
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Create package
        run: |
          mkdir -p dist
          cp build/src/cli/wraith_cli dist/wraith
          cp build/src/core/libwraith.so* dist/ 2>/dev/null || true
          cp signalrgb/WraithW60.js dist/
          chmod +x dist/wraith

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wraith-w60-linux-x64
          path: dist/

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Zip Windows build
        run: |
          cd wraith-w60-windows-x64
          zip -r ../wraith-w60-windows-x64.zip .
          cd ..

      - name: Tar Linux build
        run: |
          tar -czf wraith-w60-linux-x64.tar.gz -C wraith-w60-linux-x64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Build ${{ steps.version.outputs.VERSION }}
          files: |
            wraith-w60-windows-x64.zip
            wraith-w60-linux-x64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false