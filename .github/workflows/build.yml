name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-hidapi

      - name: Build
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Create portable package
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/src/cli/wraith_cli.exe dist/wraith.exe
          cp build/src/core/libwraith.dll dist/
          cp /ucrt64/bin/libgcc_s_seh-1.dll dist/
          cp /ucrt64/bin/libstdc++-6.dll dist/
          cp /ucrt64/bin/libhidapi-0.dll dist/
          cp /ucrt64/bin/libwinpthread-1.dll dist/
          cp signalrgb/WraithW60.js dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wraith-w60-windows-x64
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config make git \
            libudev-dev libusb-1.0-0-dev autoconf automake libtool

      - name: Install hidapi from source
        run: |
          cd /tmp
          git clone --depth 1 https://github.com/libusb/hidapi.git
          cd hidapi
          autoreconf -fi
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=/usr
          cmake --build build -j$(nproc)

      - name: Create package
        run: |
          mkdir -p dist
          cp build/src/cli/wraith_cli dist/wraith
          cp build/src/core/libwraith.so* dist/ 2>/dev/null || true
          cp signalrgb/WraithW60.js dist/
          chmod +x dist/wraith

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wraith-w60-linux-x64
          path: dist/

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4

      - name: Get version from commit
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +'%Y%m%d')
          VERSION="v1.0.${GITHUB_RUN_NUMBER}-${TIMESTAMP}-${SHORT_SHA}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Zip Windows build
        run: |
          cd wraith-w60-windows-x64
          zip -r ../wraith-w60-windows-x64.zip .
          cd ..

      - name: Tar Linux build
        run: |
          tar -czf wraith-w60-linux-x64.tar.gz -C wraith-w60-linux-x64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Wraith W60 Library ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Wraith W60 RGB Controller

            **Build Date:** ${{ steps.version.outputs.BUILD_DATE }}
            **Commit:** ${{ steps.version.outputs.SHORT_SHA }}

            ### Downloads
            - `wraith-w60-windows-x64.zip` — Windows (portable)
            - `wraith-w60-linux-x64.tar.gz` — Linux (portable)

            ### Included
            - `wraith.exe` / `wraith` — CLI tool
            - `WraithW60.js` — Signal RGB plugin

            ### Quick Start
            ```cmd
            wraith.exe backlight static 255 0 0
            ```

            ### Signal RGB Plugin
            Copy `WraithW60.js` to:
            ```
            %USERPROFILE%\Documents\WhirlwindFX\Plugins\
            ```
          files: |
            wraith-w60-windows-x64.zip
            wraith-w60-linux-x64.tar.gz
          draft: false
          prerelease: false