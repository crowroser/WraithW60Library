<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Wraith W60 - Analog Heatmap</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
h1 { margin-bottom: 10px; font-size: 24px; }
.status { margin-bottom: 20px; font-size: 14px; color: #888; }
.status.connected { color: #4ecca3; }
#connect-btn { padding: 12px 30px; font-size: 16px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
#connect-btn:hover { background: #3db891; }
#connect-btn:disabled { background: #555; cursor: not-allowed; }
.keyboard { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; }
.row { display: flex; gap: 4px; }
.key { width: 52px; height: 52px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; background: #2a2a3e; border: 1px solid #3a3a4e; transition: background 0.05s; position: relative; }
.key .label { color: #ccc; font-size: 11px; }
.key .value { color: #888; font-size: 9px; margin-top: 2px; }
.key.active { border-color: #4ecca3; }
.key .bar { position: absolute; bottom: 0; left: 0; height: 3px; border-radius: 0 0 6px 6px; transition: width 0.05s; }
.legend { display: flex; gap: 20px; align-items: center; margin-top: 10px; font-size: 12px; color: #888; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-color { width: 20px; height: 12px; border-radius: 3px; }
.info { margin-top: 15px; font-size: 13px; color: #666; max-width: 600px; text-align: center; }
.wide { width: 72px; }
.wider { width: 92px; }
.widest { width: 340px; }
</style>
</head>
<body>
<h1>Wraith W60 Analog Heatmap</h1>
<div class="status" id="status">WebHID ile klavyeye bağlanın...</div>
<button id="connect-btn" onclick="connectKeyboard()">Klavyeye Bağlan</button>

<div class="keyboard" id="keyboard"></div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background:#0d47a1"></div>0 mm</div>
    <div class="legend-item"><div class="legend-color" style="background:#1b8a5a"></div>1 mm</div>
    <div class="legend-item"><div class="legend-color" style="background:#f9a825"></div>2 mm</div>
    <div class="legend-item"><div class="legend-color" style="background:#e53935"></div>3+ mm</div>
    <div class="legend-item" style="margin-left:20px">Basınç: <span id="pressure-display">0.00 mm</span></div>
    <div class="legend-item">Aktif Tuş: <span id="active-key">-</span></div>
</div>

<div class="info">
    WebHID API kullanarak klavyenin analog manyetik switch verisini okur.<br>
    Chrome veya Edge tarayıcısında açın. "Klavyeye Bağlan" butonuna basın.
</div>

<script>
const KEY_LAYOUT = [
    // Row 0
    [{n:"Esc",w:1},{n:"1",w:1},{n:"2",w:1},{n:"3",w:1},{n:"4",w:1},{n:"5",w:1},{n:"6",w:1},{n:"7",w:1},{n:"8",w:1},{n:"9",w:1},{n:"0",w:1},{n:"-",w:1},{n:"=",w:1},{n:"Bksp",w:2}],
    // Row 1
    [{n:"Tab",w:1.5},{n:"Q",w:1},{n:"W",w:1},{n:"E",w:1},{n:"R",w:1},{n:"T",w:1},{n:"Y",w:1},{n:"U",w:1},{n:"I",w:1},{n:"O",w:1},{n:"P",w:1},{n:"[",w:1},{n:"]",w:1}],
    // Row 2
    [{n:"Caps",w:1.75},{n:"A",w:1},{n:"S",w:1},{n:"D",w:1},{n:"F",w:1},{n:"G",w:1},{n:"H",w:1},{n:"J",w:1},{n:"K",w:1},{n:"L",w:1},{n:";",w:1},{n:"'",w:1},{n:"Enter",w:2.25}],
    // Row 3
    [{n:"Shift",w:2.25},{n:"Z",w:1},{n:"X",w:1},{n:"C",w:1},{n:"V",w:1},{n:"B",w:1},{n:"N",w:1},{n:"M",w:1},{n:",",w:1},{n:".",w:1},{n:"/",w:1},{n:"Shift",w:2.75}],
    // Row 4
    [{n:"Ctrl",w:1.25},{n:"Win",w:1.25},{n:"Alt",w:1.25},{n:"Space",w:6.25},{n:"Alt",w:1.25},{n:"App",w:1.25},{n:"Ctrl",w:1.25}]
];

// VK code mapping for each key
const VK_MAP = {
    "Esc":27,"1":49,"2":50,"3":51,"4":52,"5":53,"6":54,"7":55,"8":56,"9":57,"0":48,"-":189,"=":187,"Bksp":8,
    "Tab":9,"Q":81,"W":87,"E":69,"R":82,"T":84,"Y":89,"U":85,"I":73,"O":79,"P":80,"[":219,"]":221,
    "Caps":20,"A":65,"S":83,"D":68,"F":70,"G":71,"H":72,"J":74,"K":75,"L":76,";":186,"'":222,"Enter":13,
    "Shift":16,"Z":90,"X":88,"C":67,"V":86,"B":66,"N":78,"M":77,",":188,".":190,"/":191,
    "Ctrl":17,"Win":91,"Alt":18,"Space":32,"App":93
};

let device = null;
let keyData = {}; // key name -> analog value
let keyDown = {}; // key name -> boolean
let pollInterval = null;

function heatColor(ratio) {
    if (ratio < 0.25) return `rgb(${Math.floor(ratio*4*30)}, ${Math.floor(71+ratio*4*66)}, ${Math.floor(161+ratio*4*94)})`;
    if (ratio < 0.5) return `rgb(${Math.floor(27+(ratio-0.25)*4*200)}, ${Math.floor(138-(ratio-0.25)*4*50)}, ${Math.floor(15)})`;
    if (ratio < 0.75) return `rgb(${Math.floor(227+(ratio-0.5)*4*14)}, ${Math.floor(57-(ratio-0.5)*4*20)}, ${Math.floor(15)})`;
    return `rgb(255, ${Math.floor(37-(ratio-0.75)*4*37)}, 15)`;
}

function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    KEY_LAYOUT.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'row';
        row.forEach(key => {
            const keyDiv = document.createElement('div');
            keyDiv.className = 'key' + (key.w > 1 ? ' wide' : '') + (key.w > 2 ? ' wider' : '') + (key.w > 3 ? ' widest' : '');
            keyDiv.style.width = (key.w * 52 + (key.w - 1) * 4) + 'px';
            keyDiv.id = 'key-' + key.n;
            keyDiv.innerHTML = `<span class="label">${key.n}</span><span class="value" id="val-${key.n}">0.00</span><div class="bar" id="bar-${key.n}"></div>`;
            rowDiv.appendChild(keyDiv);
        });
        kb.appendChild(rowDiv);
    });
}

function updateKeyDisplay(name, value) {
    const keyEl = document.getElementById('key-' + name);
    const valEl = document.getElementById('val-' + name);
    const barEl = document.getElementById('bar-' + name);
    if (!keyEl || !valEl || !barEl) return;

    const maxMm = 4.0;
    const ratio = Math.min(value / maxMm, 1.0);

    if (value > 0) {
        keyEl.style.background = heatColor(ratio);
        keyEl.classList.add('active');
        valEl.textContent = value.toFixed(2) + ' mm';
        valEl.style.color = ratio > 0.5 ? '#fff' : '#ccc';
        barEl.style.width = (ratio * 100) + '%';
        barEl.style.background = heatColor(ratio);
    } else {
        keyEl.style.background = '#2a2a3e';
        keyEl.classList.remove('active');
        valEl.textContent = '0.00';
        valEl.style.color = '#888';
        barEl.style.width = '0%';
    }
}

// HID report parsing - Interface 0, 8-byte reports
// Format: [status] [00] [analog_value] [00] [00] [00] [00] [00]
// status: 0x04 = key down, 0x00 = key up
// analog_value: 0-255 (maps to ~0-4mm)

let lastReport = null;

function parseInputReport(data) {
    if (data.length < 3) return;

    const status = data[0];
    const analogValue = data[2];

    // The 8-byte report doesn't tell us WHICH key directly
    // We need to correlate with keyboard events

    if (analogValue > 0) {
        document.getElementById('pressure-display').textContent =
            (analogValue * 4.0 / 255).toFixed(2) + ' mm (raw: ' + analogValue + ')';
    }
}

// Poll keyboard state using keyboard events
function setupKeyboardEvents() {
    document.addEventListener('keydown', (e) => {
        const name = Object.keys(VK_MAP).find(k => VK_MAP[k] === e.keyCode) || e.key;
        keyDown[name] = true;
    });

    document.addEventListener('keyup', (e) => {
        const name = Object.keys(VK_MAP).find(k => VK_MAP[k] === e.keyCode) || e.key;
        keyDown[name] = false;
        // Reset display when key is released
        if (keyData[name] !== undefined) {
            keyData[name] = 0;
            updateKeyDisplay(name, 0);
        }
    });
}

// Simulate analog values based on key hold duration
// This gives a rough approximation of pressure
let holdStart = {};

function startAnalogSimulation() {
    pollInterval = setInterval(() => {
        Object.keys(keyDown).forEach(name => {
            if (keyDown[name]) {
                if (!holdStart[name]) holdStart[name] = Date.now();
                const holdMs = Date.now() - holdStart[name];
                // Simulate: hold longer = more pressure, max at 500ms
                const analogValue = Math.min(255, Math.floor((holdMs / 500) * 255));
                keyData[name] = analogValue * 4.0 / 255; // convert to mm
                updateKeyDisplay(name, keyData[name]);
            }
        });
    }, 16); // 60fps
}

async function connectKeyboard() {
    const btn = document.getElementById('connect-btn');
    const status = document.getElementById('status');

    try {
        btn.disabled = true;
        btn.textContent = 'Bağlanıyor...';
        status.textContent = 'WebHID cihaz seçimi açılıyor...';
        status.className = 'status';

        // Request HID device - Wraith W60
        const devices = await navigator.hid.requestDevice({
            filters: [
                { vendorId: 0x2E3C, productId: 0xC365 }
            ]
        });

        if (!devices || devices.length === 0) {
            status.textContent = 'Cihaz seçilmedi.';
            btn.disabled = false;
            btn.textContent = 'Klavyeye Bağlan';
            return;
        }

        device = devices[0];
        await device.open();

        status.textContent = 'Bağlandı: ' + device.productName + ' (Interface: ' + device.collections[0]?.interface + ')';
        status.className = 'status connected';
        btn.textContent = 'Bağlı';

        // Listen for input reports
        device.addEventListener('inputreport', (event) => {
            const data = new Uint8Array(event.data.buffer);
            parseInputReport(data);
        });

        // Also start keyboard event polling for pressure simulation
        setupKeyboardEvents();
        startAnalogSimulation();

        status.textContent = 'Bağlı! Tuşlara basarak ısı haritası oluşturun.';

    } catch (err) {
        status.textContent = 'Hata: ' + err.message;
        btn.disabled = false;
        btn.textContent = 'Klavyeye Bağlan';
    }
}

// Build keyboard layout on load
buildKeyboard();
</script>
</body>
</html>
